# feishu-dispatcher 配置示例
# 复制到 ~/.feishu-dispatcher/config.toml 并填写。

# 飞书开发者后台 -> 应用 -> 凭证与基础信息
app_id = "cli_xxxxxxxxxxxx"
app_secret = "xxxxxxxxxxxx"

# 控制台话题群的 chat_id。必填（空则 daemon 拒绝启动）。
# 用 `feishu-dispatcher start --discover` 可在日志里看到收到消息的 chat_id
# 来发现群 id。
chat_id = ""

# 注：daemon 会在本文件同目录自动维护 sessions.json（会话映射），用于重启后
# 恢复 agent 会话（在旧话题里回复即自动 load_session 重连）。无需手动编辑。

# 发送者 open_id 白名单。留空 = 不限制（机器人所在群任何人可发命令）；
# 非空时只有名单内的发送者能触发命令。
# sender_whitelist = ["ou_your_open_id"]

# 活跃 agent 并发上限（防止 /run 进程炸弹）。
max_agents = 3

# 空闲多少秒后自动挂起 agent：关掉子进程、腾出 max_agents 名额，但会话记录保留，
# 之后在该话题回复即自动 load_session 恢复（无缝续聊）。<=0 = 不自动挂起。
# 默认 1800（30 分钟），只回收真正被搁置的 agent，不影响短暂离开。
# idle_timeout = 1800

# agent 输出合并窗口（秒）
throttle_window = 0.5

# 流式输出模式：card=原地更新卡片（默认），text=每批发新消息（兜底）
# stream_mode = "card"

# 调度器 LLM（P2）：配了才启用「自然语言派发」——群里直接说需求，LLM 识别项目并
# 派 agent，不用打 /run。任何 OpenAI 兼容端点（deepseek / GLM回归 / openai 等）。
# 可直接照抄 opencode 的 provider 配置（~/.config/opencode/opencode.json）。
# 不配则自然语言消息回退到「用法」提示，/run 等命令照常可用。
# [llm]
# base_url = "https://api.deepseek.com/v1"
# api_key = "sk-..."
# model = "deepseek-chat"

# 用法：在群里发根消息
#   /run <项目名> <任务描述>    派发任务给 agent（在根消息下建话题）
#   /agents                     列出活跃 + 历史任务
#   /clear                      清理已结束任务的历史
#   在 agent 话题内直接回复 = 追加指令（排队串行执行，session 保留上下文）
#   在 agent 话题内发 /stop     = 结束该 agent（标记 stopped）
#   在 agent 话题内发 /done     = 标记该任务完成并归档（done）

[agents]
# agent 名 -> ACP 启动命令（argv 数组），均经 ACP 协议控制、本地实测握手通过。
# Windows 上必须用 npm 装的 .cmd shim（copilot.cmd / opencode.cmd），
# daemon 会自动补 .cmd 后缀。
# - copilot：需先 `copilot` 登录过 GitHub 账号。
# - opencode：需 opencode 侧配好 provider/凭据（`opencode providers`），
#   用其默认模型；acp 模式无需额外 model 参数。
copilot = ["copilot", "--acp"]
opencode = ["opencode", "acp"]

# P0 阶段项目硬编码在这里（设计文档 P2 才做 LLM 自注册）。
# 每个项目用 default_agent 指定由哪个 agent 处理。
[[projects]]
name = "feishu-dispatcher"
path = "C:/path/to/feishu-dispatcher"
default_agent = "copilot"

# 用 opencode 处理的项目示例：
# [[projects]]
# name = "my-other-project"
# path = "C:/path/to/project"
# default_agent = "opencode"